    <script>
        $(document).ready(async function () {
            const urlWord = getParameterByName("url");
            const json = await getBlogJson();
            const contentJson = searchBlogContent(urlWord,json);
            const menberJson = searchMenberFromId(contentJson.writer,json);
            if (!json) {

            } else {
                if(contentJson.mode === "lv2"){
                    $("body").addClass("back");
                }
                $("#writer-img").attr("src",menberJson.icon);
                $("#writer-name").text(menberJson.name);
                const writerUrl = "/arg26/member/" + menberJson.id;
                $("#writer-url").attr("href",writerUrl);
                $("#blog-date").text(contentJson.date);
                $("#blog-title").text(contentJson.title);
                var content = "";
                $.each(contentJson.article, function(index, val){
                    content += "<div>"+ val +"</div>";
                });
                $("#blog-content").html(content);
            }
        })
    </script>
    <script>
        // Search Script
        $(function () {
            var $searchBox = $('.search-box');
            var $dummy = $(".search-box-dummy");
            var stickyOffset = $searchBox.offset().top;

            $(window).on('scroll', function () {
                var scrollPos = $(this).scrollTop();

                if (scrollPos > stickyOffset) {
                    $searchBox.addClass('is-fixed');
                    $dummy.show();
                } else {
                    $searchBox.removeClass('is-fixed');
                    $dummy.hide();
                }
            });
        });
    </script>
