    <script>
        $(document).ready(async function () {
            const urlWord = getParameterByName("url");
            const json = await getChatJson();
            const contentJson = searchChatContent(urlWord, json);
            if (!json) {

            } else {
                if (contentJson.mode === "lv2") {
                    $("body").addClass("back");
                }
                $("#chatpage-date").text(contentJson.date);
                $("#blog-title").text(contentJson.title);
                var $content = $("#chatpage-chats");
                $content.empty();
                $.each(contentJson.chats, function (index, val) {
                    var chat = "";
                    const num = index + 1;
                    const menberJson = searchMenberFromId(val.user_id, json);
                    chat += '<div class="chatpage-cont"><div class="chat-left"><img class="chat-icon" src="' + menberJson.icon + '"></div><div class="chat-right"><div class="chat-datas">' + num;
                    chat += '.&nbsp;&nbsp;&nbsp;&nbsp;<span class="name">' + menberJson.chat_name + '</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;id：' + menberJson.chat_id + '</div><div class="chat-message">'
                    chat += val.message;
                    $content.append(chat);
                });
            }
        })
    </script>
    <script>
        // Search Script
        $(function () {
            var $searchBox = $('.search-box');
            var $dummy = $(".search-box-dummy");
            var stickyOffset = $searchBox.offset().top;

            $(window).on('scroll', function () {
                var scrollPos = $(this).scrollTop();

                if (scrollPos > stickyOffset) {
                    $searchBox.addClass('is-fixed');
                    $dummy.show();
                } else {
                    $searchBox.removeClass('is-fixed');
                    $dummy.hide();
                }
            });
        });
    </script>
