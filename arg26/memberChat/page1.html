    <script>
        //ロード画面実装部分
        $(function () {
            $(window).on('load', function () {
                $('.loader').delay(600).fadeOut(500);
                $('.loaderbg').delay(900).fadeOut(600);
            });
            setTimeout(function () {
                $('.loaderbg').fadeOut(600);
            }, 4000);
        });    
    </script>
    <script>
        //ハンバーガーメニュー実装部
        $(function () {
            $('.menubar').on('click', function (e) {
                e.stopPropagation();
                $('.menubar_inner').toggleClass("active_m");
                $(".menu-overlay").toggleClass("active_m");
                $(this).toggleClass("active_m");
            });

            $(document).on('click', function (e) {
                if (!$(e.target).closest('.menubar_inner, .menubar').length) {
                    if ($('.menubar_inner').hasClass("active_m")) {
                        $('.menubar_inner').removeClass("active_m");
                        $(".menu-overlay").removeClass("active_m");
                        $('.menubar').removeClass("active_m");
                    }
                }
            });
        });
    </script>
